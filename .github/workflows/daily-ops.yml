name: Daily Ops

# Durable daily scheduler for the autonomous operator (see docs/ops/RUNBOOK.md).
# Runs on GitHub's infrastructure — independent of claude.ai routines (which
# were erroring in research preview as of 2026-07-01).
#
# Activation requires two repository secrets (Settings → Secrets → Actions):
#   ANTHROPIC_API_KEY  — https://console.anthropic.com/settings/keys
#   VERCEL_TOKEN       — pulls production env vars (scripts/ops/pull-env.sh)
# Until they exist, the workflow no-ops with a pointer to docs/ops/NEEDS.md.

on:
  schedule:
    - cron: '23 10 * * *' # 10:23 UTC daily (~6:23am ET)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: daily-ops
  cancel-in-progress: false

jobs:
  daily-ops:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Check activation secrets
        id: check
        env:
          HAS_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' }}
        run: |
          if [ "$HAS_KEY" != "true" ]; then
            echo "::notice::ANTHROPIC_API_KEY secret not set — daily ops skipped. See docs/ops/NEEDS.md item 1."
          fi
          echo "enabled=$HAS_KEY" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: steps.check.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run daily operator
        if: steps.check.outputs.enabled == 'true'
        uses: anthropics/claude-code-action@v1
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          GH_TOKEN: ${{ github.token }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            You are the autonomous operator of goose.gifts with standing
            authorization from the owner (Cameron Ehrlich) to merge and
            deploy. Read docs/ops/RUNBOOK.md and execute today's run exactly
            as it describes. Notes for this CI context:
            - Use the `gh` CLI (GH_TOKEN is set) for PRs, merges, and issues.
            - VERCEL_TOKEN is set; runbook step 0 bootstraps credentials.
            - Commit to a claude/-prefixed branch, open a PR, merge it.
          claude_args: |
            --dangerously-skip-permissions
